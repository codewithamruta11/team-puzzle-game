<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Arena</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    padding:20px;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}
.box{
    max-width:1100px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
}
button{
    padding:12px 20px;
    font-size:18px;
    margin:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.timer{font-size:50px;margin:10px;}
.correct-answer{font-size:28px;margin-top:15px;}

.scoreboard{
    display:flex;
    justify-content:space-around;
    margin-bottom:20px;
}
.team{
    background:rgba(0,0,0,0.3);
    padding:15px;
    border-radius:12px;
    width:30%;
}
.score{
    font-size:40px;
    font-weight:bold;
}
@keyframes gradientMove{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}
</style>
</head>

<body>
<div class="box">

<h1>🎉 PUZZLE ARENA 🎉</h1>

<!-- 🔥 SCOREBOARD -->
<div class="scoreboard">

    <!-- 👉 CHANGE TEAM NAMES HERE -->
    <div class="team">
        <h2 id="team1Name">Team A</h2>
        <div class="score" id="score1">0</div>
        <button onclick="addPoint(1)">+ Point</button>
    </div>

    <div class="team">
        <h2 id="team2Name">Team B</h2>
        <div class="score" id="score2">0</div>
        <button onclick="addPoint(2)">+ Point</button>
    </div>

    <div class="team">
        <h2 id="team3Name">Team C</h2>
        <div class="score" id="score3">0</div>
        <button onclick="addPoint(3)">+ Point</button>
    </div>

</div>

<button onclick="resetScores()">🔄 Reset Scores</button>

<hr>

<h2 id="question"></h2>
<div class="timer" id="timer">15</div>

<button onclick="showAnswer()">Show Answer</button>
<button onclick="nextQuestion()">Next</button>

<div id="answer"></div>

</div>

<script>

let index=0;
let timerInt;

// QUESTIONS
const questions=[
{q:"I live in memory, forget when power dies",a:"RAM"},
{q:"I have keys but no locks",a:"KEYBOARD"},
{q:"I dry your body",a:"TOWEL"},
{q:"I shine at night",a:"MOON"},
{q:"Remove from me I become bigger",a:"HOLE"}
];

// SCORE
let scores=[0,0,0];

// LOAD QUESTION
function loadQuestion(){
    document.getElementById("question").innerText=
        questions[index].q;

    document.getElementById("answer").innerHTML="";
    startTimer();
}

// TIMER
function startTimer(){
    let t=15;
    timer.innerText=t;
    clearInterval(timerInt);

    timerInt=setInterval(()=>{
        t--;
        timer.innerText=t;
        if(t<=0) clearInterval(timerInt);
    },1000);
}

// SHOW ANSWER
function showAnswer(){
    let q=questions[index];
    document.getElementById("answer").innerHTML=
        "<div class='correct-answer'>"+q.a+"</div>";
}

// NEXT
function nextQuestion(){
    index++;
    if(index>=questions.length){
        alert("Game Over!");
        return;
    }
    loadQuestion();
}

// ADD POINT
function addPoint(team){
    scores[team-1]++;
    document.getElementById("score"+team).innerText=scores[team-1];
}

// RESET
function resetScores(){
    scores=[0,0,0];
    document.getElementById("score1").innerText=0;
    document.getElementById("score2").innerText=0;
    document.getElementById("score3").innerText=0;
}

// START
loadQuestion();

</script>

</body>
</html>
