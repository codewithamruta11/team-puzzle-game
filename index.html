<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantec Puzzle Challenge</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
    padding:30px;
    min-height:100vh;
    background: linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}

.box{
    max-width:1100px;
    margin:auto;
    padding:50px;
    border-radius:28px;
    min-height:650px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 12px 40px rgba(0,0,0,0.35);
    animation: slideIn 0.8s ease;
}

.hidden{ display:none; }

button{
    padding:14px 26px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    transition: all 0.3s ease;
}

button:hover{
    transform: scale(1.08);
}

.timer{
    font-size:64px;
    font-weight:bold;
    margin:20px 0;
    animation: pulse 1s infinite;
}

.reverse-answer{
    font-size:54px;
    font-weight:bold;
    margin-top:20px;
    animation: popIn 0.8s ease;
}

.correct-answer{
    font-size:32px;
    font-weight:bold;
    margin-top:20px;
    animation: fadeUp 1s ease;
}

.answer-img{
    max-width:250px;
    border-radius:20px;
    margin-top:20px;
    animation: zoomIn 0.8s ease;
}

#question{
    white-space:pre-line;
    line-height:1.8;
    font-size:30px;
    animation: fadeUp 0.8s ease;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes slideIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes popIn{
    from{opacity:0;transform:scale(0.7);}
    to{opacity:1;transform:scale(1);}
}

@keyframes zoomIn{
    from{opacity:0;transform:scale(0.8);}
    to{opacity:1;transform:scale(1);}
}
</style>
</head>
<body>

<div class="box">

<div id="intro">
    <h1 style="font-size:52px;">🎉 Gantec Puzzle Challenge 🎉</h1>
    <h2>Think Fast • Reverse First • Win Big 🏆</h2>
    <button onclick="startIntro()">▶ Start Game</button>
</div>

<div id="rules" class="hidden">
    <h1>📋 Rules</h1>
    <p>1) Answer can be word or number</p>
    <p>2) Only 20 seconds</p>
    <p>3) First answer in reverse order</p>
    <p>4) First team gets point</p>
    <button onclick="goExample()">Next</button>
</div>

<div id="example" class="hidden">
    <h1>💡 Example</h1>
    <h2>What gets wetter the more it dries?</h2>
    <div class="reverse-answer">LEWOT</div>
    <img class="answer-img"
         src="https://images.unsplash.com/photo-1582735689369-4fe89db7114c?w=400">
    <div class="correct-answer">TOWEL</div>
    <button onclick="startGame()">🎮 Start Level 1</button>
</div>

<div id="game" class="hidden">
    <h1 id="levelTitle">LEVEL 1</h1>
    <h2 id="question"></h2>
    <div class="timer" id="timer">20</div>
    <button onclick="showAnswer()">Show Answer</button>
    <button onclick="nextQuestion()">Next</button>
    <div id="answer"></div>
</div>

</div>

<script>
let level=1;
let index=0;

const levels = {
level1:[
{q:"I live in memory\nforget when power dies\nhelp programs run fast\nwhat am I?",a:"RAM"}
],
level2:[
{q:"I protect your house\nblock digital enemies\nwhat am I?",a:"FIREWALL"}
],
level3:[
{q:"I run websites\nstay unseen\nwhat am I?",a:"SERVER"}
]
};

function speak(text){
    speechSynthesis.cancel();
    let msg=new SpeechSynthesisUtterance(text);
    msg.rate=0.95;
    msg.pitch=1;
    speechSynthesis.speak(msg);
}

function startIntro(){
    speak("Welcome Gantec team. Get ready for the fun challenge.");
    intro.classList.add("hidden");
    rules.classList.remove("hidden");

    setTimeout(()=>{
        speak("Please read the rules carefully.");
    },1500);
}

function goExample(){
    rules.classList.add("hidden");
    example.classList.remove("hidden");
    speak("Here is your reference example.");
}

function startGame(){
    example.classList.add("hidden");
    game.classList.remove("hidden");
    speak("Level 1 starts now.");
    loadQuestion();
}

function loadQuestion(){
    let q=levels["level"+level][index];
    question.innerText=q.q;
    answer.innerHTML="";
    speak("Here is your question. " + q.q.replace(/\n/g," "));
    startTimer();
}

function startTimer(){
    let t=20;
    timer.innerText=t;

    clearInterval(window.timerInt);
    window.timerInt=setInterval(()=>{
        t--;
        timer.innerText=t;
        if(t<=0){
            clearInterval(window.timerInt);
            speak("Time is up.");
        }
    },1000);
}

function showAnswer(){
    let q=levels["level"+level][index];
    let rev=q.a.split("").reverse().join("");

    answer.innerHTML=
    "<div class='reverse-answer'>"+rev+"</div>"+
    "<img class='answer-img' src='https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=400'>"+
    "<div class='correct-answer'>"+q.a+"</div>";

    speak("Answer is " + rev + ". Correct answer is " + q.a);
}

function nextQuestion(){
    index++;

    if(index>=levels["level"+level].length){
        level++;
        index=0;

        if(level>3){
            speak("Congratulations. Game completed.");
            alert("🏆 Game Completed");
            return;
        }

        speak("Level " + (level-1) + " completed. Moving to level " + level);
        levelTitle.innerText="LEVEL "+level;
    }

    loadQuestion();
}
</script>

</body>
</html>
