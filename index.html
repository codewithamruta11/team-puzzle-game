<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Arena</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
min-height:100vh;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
}
.box{
max-width:1100px;
margin:auto;
padding:50px;
border-radius:28px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(16px);
}
.hidden{display:none;}
button{
padding:14px 28px;
font-size:18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:white;
}
.timer{font-size:60px;}
.correct-answer{font-size:30px;margin-top:20px;}
#question{font-size:32px;}
@keyframes gradientMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
</style>
</head>

<body>
<div class="box">

<!-- INTRO -->
<div id="intro">
<h1>🎉 GANTEC PUZZLE ARENA 🎉</h1>
<h2>Think Fast ⚡ Win Big 🏆</h2>
<button onclick="startFlow()">▶ START</button>
</div>

<!-- RULES -->
<div id="rules" class="hidden">
<h1>📋 RULES</h1>
<div id="rulesText"></div>
<button onclick="goBack('intro')">⬅ Back</button>
<button onclick="goExample()">Next ➜</button>
</div>

<!-- EXAMPLE -->
<div id="example" class="hidden">
<h1>💡 EXAMPLE</h1>
<h2>What gets wetter the more it dries?</h2>
<button onclick="showExample()">Show Answer</button>
<div id="exampleAns"></div>
<br>
<button onclick="goBack('rules')">⬅ Back</button>
<button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
<h1 id="levelTitle"></h1>
<h2 id="question"></h2>
<div class="timer" id="timer">15</div>
<button onclick="showAnswer()">Show Answer</button>
<button onclick="nextQuestion()">Next</button>
<br>
<button onclick="goBack('example')">⬅ Back</button>
<div id="answer"></div>
</div>

</div>

<script>

// 🔊 Clean speech (no overlap)
function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.rate=1;
msg.pitch=1.1;
speechSynthesis.speak(msg);
}

/* 🎬 FULL FLOW */
function startFlow(){

// show intro speech first
speak("Welcome everyone to the Gantec Puzzle Arena! Get ready for an exciting battle of brains! Think fast and win big!");

// after intro → go rules
setTimeout(()=>{
intro.classList.add("hidden");
rules.classList.remove("hidden");
showRules();
},6000);

}

/* 📋 RULES */
function showRules(){

let rulesList=[
"Each team must listen carefully to the question.",
"You will have fifteen seconds to answer.",
"There are three levels.",
"Each level has ten questions.",
"Difficulty increases each level.",
"First correct team wins the point.",
"Stay sharp and enjoy the game."
];

rulesText.innerHTML = rulesList.map(r=>"👉 "+r+"<br><br>").join("");

// speak rules
setTimeout(()=>{
speak(rulesList.join(". "));
},1000);
}

/* 💡 EXAMPLE */
function goExample(){
rules.classList.add("hidden");
example.classList.remove("hidden");

speak("Example question. What gets wetter the more it dries?");
}

function showExample(){
exampleAns.innerHTML="<div class='correct-answer'>TOWEL</div>";
speak("The correct answer is towel.");
}

/* 🚀 START GAME */
function startGame(){
example.classList.add("hidden");
game.classList.remove("hidden");

speak("Get ready teams! Level one begins now!");

loadQuestion();
}

/* 🔙 BACK */
function goBack(page){
intro.classList.add("hidden");
rules.classList.add("hidden");
example.classList.add("hidden");
game.classList.add("hidden");

document.getElementById(page).classList.remove("hidden");
speechSynthesis.cancel();
}

/* GAME */
let index=0,timerInt;

const questions=[
{q:"I live in memory forget when power dies",a:"RAM"},
{q:"I have many keys open no locks",a:"KEYBOARD"},
{q:"I dry your body become wet myself",a:"TOWEL"}
];

function loadQuestion(){
let q=questions[index];
question.innerText=q.q;
speak(q.q);
startTimer();
}

function startTimer(){
let t=15;
timer.innerText=t;
clearInterval(timerInt);

timerInt=setInterval(()=>{
t--;
timer.innerText=t;
if(t<=0){
clearInterval(timerInt);
speak("Time is up");
}
},1000);
}

function showAnswer(){
let q=questions[index];
answer.innerHTML="<div class='correct-answer'>"+q.a+"</div>";
speak("Correct answer is "+q.a);
}

function nextQuestion(){
index++;
if(index>=questions.length){
alert("Game Over");
return;
}
loadQuestion();
}

</script>
</body>
</html>
