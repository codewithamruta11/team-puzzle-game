<!DOCTYPE html>
<html>
<head>
  <title>Team Puzzle Championship</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      padding: 30px;
      margin: 0;
    }
    .box {
      max-width: 1100px;
      margin: auto;
      background: white;
      color: black;
      padding: 50px;
      border-radius: 24px;
      min-height: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    button {
      padding: 14px 24px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .big { font-size: 48px; }
    .timer { font-size: 60px; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div id="intro">
      <h1 class="big">🎉 Welcome Gantec Team 🎉</h1>
      <p id="welcomeText">Get ready for an exciting and fun team challenge!</p>
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=900" style="width:100%;max-height:260px;object-fit:cover;border-radius:16px;" />
      <br><br>
      <button onclick="playWelcomeAndShowRules()">▶ Start Fun Game</button>
    </div>

    <div id="rules" class="hidden" style="background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=900');background-size:cover;border-radius:20px;padding:30px;">
      <h1>📋 Game Rules</h1>
      <p>1. Teams must answer in <b>reverse order</b></p>
      <p>2. Example: towel → <b>lewot</b></p>
      <p>3. First reveal reverse answer, then correct answer</p>
      <p>4. 20 seconds timer for each question</p>
      <button onclick="startGame()">Begin Round</button>
    </div>

    <div id="game" class="hidden" style="background-image:url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=900');background-size:cover;border-radius:20px;padding:30px;">
      <h1>🏆 Team Puzzle Championship</h1>
      <h2 id="question"></h2>
      <div class="timer" id="timer">20</div>
      <button onclick="showBothAnswers()">Show Answer</button>
      <button onclick="nextQuestion()">Next</button>
      <h2 id="answer"></h2>
    </div>
  </div>

  <script>
    const questions = [
      { q: 'What gets wetter the more it dries?', a: 'Towel' },
      { q: 'What has keys but cannot open locks?', a: 'Piano' },
      { q: 'What has hands but cannot clap?', a: 'Clock' }
    ];

    let index = 0;
    let timerInterval;

    function playSound(freq = 800, duration = 150) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.04;
      osc.start();
      osc.stop(ctx.currentTime + duration / 1000);
    }

    function playVoiceLikeMessage(text, freq=600) {
      playSound(freq, 220);
      const el = document.getElementById('welcomeText');
      if (el && text) el.innerText = text;
    }

    function playWelcomeAndShowRules() {
      playVoiceLikeMessage('Welcome Gantec employees, are you ready for fun?');
      setTimeout(() => playSound(1000, 400), 500);
      setTimeout(() => showRules(), 1200);
    }

    function showRules() {
      playSound(700);
      document.getElementById('intro').classList.add('hidden');
      document.getElementById('rules').classList.remove('hidden');
    }

    function startGame() {
      playSound(1000);
      document.getElementById('rules').classList.add('hidden');
      document.getElementById('game').classList.remove('hidden');
      loadQuestion();
    }

    function loadQuestion() {
      document.getElementById('question').innerText = questions[index].q;
      document.getElementById('answer').innerText = '';
      startTimer();
    }

    function startTimer() {
      let time = 20;
      document.getElementById('timer').innerText = time;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        time--;
        document.getElementById('timer').innerText = time;
        playSound(1200, 60);
        if (time <= 0) clearInterval(timerInterval);
      }, 1000);
    }

    function showBothAnswers() {
      const ans = questions[index].a;
      const rev = ans.split('').reverse().join('').toLowerCase();
      document.getElementById('answer').innerHTML = '🔄 Reverse: <b>' + rev + '</b><br><br>✅ Correct: <b>' + ans + '</b>';
      playSound(1400, 300);
    }

    function nextQuestion() {
      index = (index + 1) % questions.length;
      loadQuestion();
    }
  </script>
</body>
</html>
