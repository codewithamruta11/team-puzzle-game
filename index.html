<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gantec Puzzle Arena</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    padding:30px;
    min-height:100vh;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}
.box{
    max-width:1100px;
    margin:auto;
    padding:50px;
    border-radius:28px;
    background:rgba(255,255,255,0.12);
}
.hidden{display:none;}
button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
.timer{font-size:60px;}
.correct-answer{font-size:30px;}
.answer-image{width:250px;margin-top:15px;}
@keyframes gradientMove{
0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}
}
</style>
</head>

<body>
<div class="box">

<div id="intro">
<h1>🎉 GANTEC PUZZLE ARENA 🎉</h1>
<button onclick="startIntro()">START</button>
</div>

<div id="rules" class="hidden">
<h1>📋 RULES</h1>
<div id="rulesText"></div>
<button onclick="goExample()">NEXT</button>
</div>

<div id="example" class="hidden">
<h2>Example Question</h2>
<h3>What gets wetter the more it dries?</h3>
<button onclick="showExample()">Show Answer</button>
<div id="exAns"></div>
<button onclick="startGame()">START GAME</button>
</div>

<div id="game" class="hidden">
<h1 id="levelTitle"></h1>
<h2 id="question"></h2>
<div class="timer" id="timer">15</div>
<button onclick="showAnswer()">Show Answer</button>
<button onclick="nextQuestion()">Next</button>
<div id="answer"></div>
</div>

</div>

<script>

// 🔊 FIXED SPEAK (queue system)
function speakQueue(lines){
    let i=0;
    function next(){
        if(i>=lines.length) return;
        let msg=new SpeechSynthesisUtterance(lines[i]);
        msg.onend=()=>{i++;next();};
        speechSynthesis.speak(msg);
    }
    next();
}

// INTRO
function startIntro(){
    intro.classList.add("hidden");
    rules.classList.remove("hidden");

    speakQueue([
        "Welcome everyone to the Gantec Puzzle Arena!",
        "Get ready for an exciting battle of brains.",
        "Think fast, answer smart, and win big!"
    ]);

    showRules();
}

// RULES TEXT + VOICE
function showRules(){
    let rulesList=[
        "Each team must listen carefully to the question.",
        "You will have fifteen seconds to answer.",
        "Answer must be in normal format, no reverse.",
        "First correct team wins the point.",
        "There are three levels in this game.",
        "Each level has ten questions.",
        "Difficulty will increase with each level.",
        "Stay focused and enjoy the challenge!"
    ];

    rulesText.innerHTML=rulesList.map(r=>"👉 "+r+"<br><br>").join("");

    speakQueue(rulesList);
}

// EXAMPLE
function goExample(){
    rules.classList.add("hidden");
    example.classList.remove("hidden");

    speakQueue([
        "Let's look at an example question.",
        "What gets wetter the more it dries?"
    ]);
}

function showExample(){
    exAns.innerHTML="<div class='correct-answer'>TOWEL</div>";
    speakQueue(["The correct answer is towel."]);
}

// START GAME
function startGame(){
    example.classList.add("hidden");
    game.classList.remove("hidden");

    speakQueue([
        "Teams, get ready!",
        "Level one begins now!"
    ]);

    loadQuestion();
}

// QUESTIONS
let level=1,index=0,timerInt;

const levels={
level1:Array(10).fill({q:"I live in memory, forget when power dies",a:"RAM"}),
level2:Array(10).fill({q:"I have keys but no locks",a:"KEYBOARD"}),
level3:Array(10).fill({q:"I dry your body",a:"TOWEL"})
};

function loadQuestion(){
    let q=levels["level"+level][index];
    levelTitle.innerText="LEVEL "+level;
    question.innerText="Q"+(index+1)+": "+q.q;
    answer.innerHTML="";
    speakQueue([q.q]);
    startTimer();
}

function startTimer(){
    let t=15;
    timer.innerText=t;
    clearInterval(timerInt);

    timerInt=setInterval(()=>{
        t--;
        timer.innerText=t;
        if(t<=0){
            clearInterval(timerInt);
            speakQueue(["Time is up"]);
        }
    },1000);
}

function showAnswer(){
    let q=levels["level"+level][index];
    answer.innerHTML="<div class='correct-answer'>"+q.a+"</div>";
    speakQueue(["Correct answer is "+q.a]);
}

function nextQuestion(){
    index++;
    if(index>=10){
        level++;
        index=0;

        if(level>3){
            alert("🏆 GAME COMPLETED");
            return;
        }

        speakQueue(["Level "+level+" begins now"]);
    }
    loadQuestion();
}

</script>
</body>
</html>
