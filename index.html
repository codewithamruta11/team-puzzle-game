<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gantec Puzzle Arena</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
min-height:100vh;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
}
.box{
max-width:1100px;
margin:auto;
padding:50px;
border-radius:28px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(16px);
}
.hidden{display:none;}
button{
padding:16px 32px;
font-size:22px;
margin:12px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
}
.timer{font-size:70px;}
.correct-answer{font-size:32px;margin-top:20px;}
.answer-image{width:260px;margin-top:20px;border-radius:12px;}
#question{font-size:34px;white-space:pre-line;}

@keyframes gradientMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
</style>
</head>

<body>
<div class="box">

<!-- INTRO -->
<div id="intro">
<h1 style="font-size:70px;">🎉 GANTEC PUZZLE ARENA 🎉</h1>
<h2>Think Fast ⚡ Win Big 🏆</h2>
<button onclick="startIntro()">▶ START</button>
</div>

<!-- RULES -->
<div id="rules" class="hidden">
<h1>📋 RULES</h1>
<div id="rulesText" style="font-size:28px;line-height:2;"></div>
<button onclick="goExample()">NEXT</button>
</div>

<!-- EXAMPLE -->
<div id="example" class="hidden">
<h1>💡 EXAMPLE</h1>
<h2>What gets wetter the more it dries?</h2>
<button onclick="showExample()">Show Answer</button>
<div id="exampleAns"></div>
<button onclick="startGame()">🎮 START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
<h1 id="levelTitle"></h1>
<h2 id="question"></h2>
<div class="timer" id="timer">15</div>
<button onclick="showAnswer()">Show Answer</button>
<button onclick="nextQuestion()">Next</button>
<div id="answer"></div>
</div>

</div>

<script>

/* 🔊 PERFECT SPEECH QUEUE (NO MIXING) */
let speaking=false;
function speakQueue(lines){
    if(speaking) speechSynthesis.cancel();
    speaking=true;

    let i=0;
    function speakNext(){
        if(i>=lines.length){
            speaking=false;
            return;
        }
        let msg=new SpeechSynthesisUtterance(lines[i]);
        msg.onend=()=>{ i++; speakNext(); };
        speechSynthesis.speak(msg);
    }
    speakNext();
}

/* 🎤 INTRO */
function startIntro(){
    intro.classList.add("hidden");
    rules.classList.remove("hidden");

    showRules();

    speakQueue([
        "Welcome everyone to the Gantec Puzzle Arena!",
        "Get ready for an exciting battle of brains.",
        "Listen carefully to the rules."
    ]);
}

/* 📋 RULES */
function showRules(){
let rulesList=[
"Each team must listen carefully to the question.",
"You will have fifteen seconds to answer.",
"Answer must be in normal format, no reverse.",
"First correct team wins the point.",
"There are three levels in this game.",
"Each level contains ten questions.",
"Difficulty increases in each level.",
"Stay sharp and enjoy the challenge!"
];

rulesText.innerHTML = rulesList.map(r=>"👉 "+r+"<br><br>").join("");

setTimeout(()=>{
    speakQueue(rulesList);
},3000);
}

/* 💡 EXAMPLE */
function goExample(){
    rules.classList.add("hidden");
    example.classList.remove("hidden");

    speakQueue([
        "Let's see an example.",
        "What gets wetter the more it dries?"
    ]);
}

function showExample(){
    exampleAns.innerHTML =
        "<img class='answer-image' src='https://images.unsplash.com/photo-1582735689369-4fe89db7114c?w=500'>" +
        "<div class='correct-answer'>TOWEL</div>";

    speakQueue(["The correct answer is towel."]);
}

/* 🚀 START GAME */
function startGame(){
    example.classList.add("hidden");
    game.classList.remove("hidden");

    speakQueue([
        "Teams get ready!",
        "Level one begins now!"
    ]);

    loadQuestion();
}

/* 🎮 GAME DATA */
let level=1,index=0,timerInt;

const levels={
level1:[
{q:"I live in memory forget when power dies",a:"RAM"},
{q:"I have many keys open no locks",a:"KEYBOARD"},
{q:"I dry your body become wet myself",a:"TOWEL"},
{q:"I shine at night vanish by day",a:"MOON"},
{q:"Remove from me I become bigger",a:"HOLE"},
{q:"I show time but no eyes",a:"CLOCK"},
{q:"I catch bugs help developers",a:"DEBUGGER"},
{q:"I grow without life need air",a:"FIRE"},
{q:"Eight bits make me",a:"BYTE"},
{q:"Smallest unit of data",a:"BIT"}
],
level2:[
{q:"I connect internet sit blinking",a:"ROUTER"},
{q:"I protect system block attacks",a:"FIREWALL"},
{q:"I repeat forever in code",a:"LOOP"},
{q:"I connect apps front and back",a:"API"},
{q:"I store millions of rows",a:"DATABASE"},
{q:"I run websites unseen",a:"SERVER"},
{q:"I disappear when spoken",a:"SILENCE"},
{q:"I speak without mouth",a:"ECHO"},
{q:"Others use me but it is yours",a:"NAME"},
{q:"I protect passwords one way",a:"HASHING"}
],
level3:[
{q:"Brain of system",a:"CPU"},
{q:"Hide in code cause trouble",a:"BUG"},
{q:"Go back in code history",a:"GIT"},
{q:"Store data permanently",a:"DISK"},
{q:"Machines learn future tech",a:"AI"},
{q:"Cities roads rivers no people",a:"MAP"},
{q:"Break without touch",a:"PROMISE"},
{q:"Forward heavy backward not",a:"TON"},
{q:"Taken from mine locked in wood",a:"PENCIL"},
{q:"Measure distance between points",a:"RULER"}
]
};

/* QUESTION */
function loadQuestion(){
let q=levels["level"+level][index];
levelTitle.innerText="LEVEL "+level;
question.innerText="Q"+(index+1)+": "+q.q;
answer.innerHTML="";

speakQueue([q.q]);

startTimer();
}

/* TIMER */
function startTimer(){
let t=15;
timer.innerText=t;
clearInterval(timerInt);

timerInt=setInterval(()=>{
t--;
timer.innerText=t;

if(t<=0){
clearInterval(timerInt);
speakQueue(["Time is up"]);
}
},1000);
}

/* ANSWER */
function showAnswer(){
let q=levels["level"+level][index];

answer.innerHTML =
"<img class='answer-image' src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500'>" +
"<div class='correct-answer'>"+q.a+"</div>";

speakQueue(["Correct answer is "+q.a]);
}

/* NEXT */
function nextQuestion(){
index++;

if(index>=10){
level++;
index=0;

if(level>3){
alert("🏆 GAME COMPLETED");
return;
}

speakQueue(["Level "+level+" begins now"]);
}

loadQuestion();
}

</script>
</body>
</html>
